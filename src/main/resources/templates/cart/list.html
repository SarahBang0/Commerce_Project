<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">🛒 내 장바구니</h2>
        <a th:href="@{/items/list}" class="btn btn-outline-secondary rounded-pill shadow-sm">
            <i class="bi bi-arrow-left"></i> 쇼핑 계속하기
        </a>
    </div>

    <div th:if="${cart == null or #lists.isEmpty(cart.cartItems)}"
         class="card border-0 shadow-sm py-5 text-center">
        <div class="card-body">
            <i class="bi bi-cart-x text-secondary" style="font-size: 4rem;"></i>
            <h4 class="mt-3 text-secondary">장바구니가 비어있습니다.</h4>
            <p class="text-muted">원하는 상품을 담아보세요!</p>
            <a th:href="@{/items}" class="btn btn-primary rounded-pill px-4 mt-2">상품 보러 가기</a>
        </div>
    </div>

    <div th:if="${cart != null and !#lists.isEmpty(cart.cartItems)}">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 text-center">
                    <thead class="table-light">
                    <tr>
                        <th class="py-3">상품명</th>
                        <th>단가</th>
                        <th>수량</th>
                        <th>합계</th>
                        <th>삭제</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cart.cartItems}">
                        <td class="text-start ps-4">
                            <span class="fw-bold text-dark" th:text="${item.itemName}">상품명</span>
                        </td>
                        <td th:text="|${#numbers.formatInteger(item.price, 0, 'COMMA')}원|">0원</td>
                        <td>
                            <span class="badge bg-info text-dark rounded-pill px-3" th:text="|${item.count}개|">1개</span>
                        </td>
                        <td class="fw-bold text-primary" th:text="|${#numbers.formatInteger(item.totalItemPrice, 0, 'COMMA')}원|">0원</td>
                        <td>
                            <form th:action="@{/carts/item/{id}/delete(id=${item.itemId})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-circle">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 offset-md-6">
                <div class="card border-0 shadow-sm p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="h5 mb-0">총 주문 금액</span>
                        <h3 class="fw-bold text-primary mb-0"
                            th:text="|${#numbers.formatInteger(cart.totalPrice, 0, 'COMMA')}원|">0원</h3>
                    </div>
                    <hr>
                    <form th:action="@{/orders/cart}" method="post">
                        <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm py-3 fw-bold">
                            <i class="bi bi-credit-card"></i> 최종 주문하기
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<nav th:replace="~{fragments/footer :: footer}"></nav>


</body>
</html>
