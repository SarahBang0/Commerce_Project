<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>


<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">상품 목록</h2>

        <a th:href="@{/categories}" class="btn btn-outline-success rounded-pill me-2">
            <i class="bi bi-tags"></i> 카테고리 관리
        </a>

        <a th:href="@{/items/create}" class="btn btn-primary rounded-pill shadow-sm">
            <i class="bi bi-plus-lg"></i> 상품 등록
        </a>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <form th:action="@{/items}" method="get" id="filterForm">
                <select name="categoryId" class="form-select rounded-pill shadow-sm" onchange="this.form.submit()">
                    <option value="">전체 카테고리</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${#strings.equals(param.categoryId, category.id)}">카테고리명</option>
                </select>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>카테고리</th> <th>상품명</th>
                    <th>가격</th>
                    <th>재고</th>
                    <th>상세/수정</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.itemId}">1</td>
                    <td>
                        <span class="badge bg-secondary" th:text="${item.categoryName}">카테고리</span>
                    </td>
                    <td class="fw-bold" th:text="${item.name}">나이키 운동화</td>
                    <td th:text="|${#numbers.formatInteger(item.price, 0, 'COMMA')}원|">10,000원</td>
                    <td>
                            <span th:text="|${item.quantity}개|"
                                  th:classappend="${item.quantity < 10} ? 'text-danger fw-bold' : ''">100개</span>
                    </td>
                    <td>
                        <div class="btn-group">
                            <a th:href="@{/items/{id}(id=${item.itemId})}" class="btn btn-sm btn-outline-info">상세</a>
                            <a th:href="@{/items/{id}/edit(id=${item.itemId})}" class="btn btn-sm btn-outline-warning">수정</a>
                            <td>
                                <form th:action="@{/cart/add}" method="post" class="d-flex justify-content-center">
                                    <input type="hidden" name="itemId" th:value="${item.itemId}">
                                    <input type="number" name="count" value="1" min="1" class="form-control form-control-sm me-1" style="width: 60px;">
                                    <button type="submit" class="btn btn-sm btn-outline-primary">담기</button>
                                </form>
                            </td>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
