<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">
            <i class="bi bi-shop"></i> JIEUN COMMERCE
        </a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="py-5 text-center">
        <h2 class="fw-bold">상품 수정</h2>
    </div>

    <div class="card border-0 shadow-sm p-4">
        <form th:action="@{/items/{id}/edit(id=${item.itemId})}" method="post">

            <input type="hidden" name="itemId" th:value="${item.itemId}">

            <div class="mb-3">
                <label class="form-label fw-bold">카테고리</label>
                <select name="categoryId" class="form-select" required>
                    <option value="">-- 카테고리를 선택하세요 --</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${category.id == item.categoryId}">카테고리명</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">상품명</label>
                <input type="text" name="name" th:value="${item.name}"
                       class="form-control" placeholder="상품명을 입력하세요">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">가격</label>
                <div class="input-group">
                    <input type="number" name="price" th:value="${item.price}"
                           class="form-control" placeholder="가격을 입력하세요">
                    <span class="input-group-text">원</span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">재고수량</label>
                <div class="input-group">
                    <input type="number" name="quantity" th:value="${item.quantity}"
                           class="form-control" placeholder="수량을 입력하세요">
                    <span class="input-group-text">개</span>
                </div>
            </div>

            <hr class="my-4">

            <div class="row g-2">
                <div class="col">
                    <button class="w-100 btn btn-primary btn-lg rounded-pill" type="submit">수정 완료</button>
                </div>
                <div class="col">
                    <button class="w-100 btn btn-outline-secondary btn-lg rounded-pill"
                            th:onclick="|location.href='@{/items}'|" type="button">취소</button>
                </div>
            </div>
        </form>
    </div>
</div>

<nav th:replace="~{fragments/footer :: footer}"></nav>

</body>
</html>
