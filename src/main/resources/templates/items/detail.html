<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>



<div class="container py-5" style="max-width: 800px;">
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="row g-0">
            <div class="col-md-5 bg-white d-flex align-items-center justify-content-center border-end">
                <i class="bi bi-box-seam display-1 text-secondary"></i>
            </div>
            <div class="col-md-7">
                <div class="card-body p-4">
                    <h6 class="text-primary fw-bold text-uppercase mb-2">Item Detail</h6>
                    <h2 class="fw-bold mb-3" th:text="${item.name}">상품 이름</h2>
                    <hr>
                    <div class="mb-3">
                        <span class="text-muted d-block">판매 가격</span>
                        <span class="fs-3 fw-bold text-dark" th:text="|${#numbers.formatInteger(item.price, 0, 'COMMA')}원|">0원</span>
                    </div>
                    <div class="mb-4">
                        <span class="text-muted d-block">현재 재고</span>
                        <span class="fs-4 fw-bold" th:text="|${item.stockQuantity}개|">0개</span>
                    </div>

                    <div class="d-grid gap-2">
                        <a th:href="@{/items/{id}/edit(id=${item.itemId})}" class="btn btn-dark btn-lg rounded-pill">정보 수정</a>
                        <a th:href="@{/items}" class="btn btn-outline-secondary rounded-pill">목록으로</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<nav th:replace="~{fragments/footer :: footer}"></nav>

</body>
</html>
