<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">
            <i class="bi bi-shop"></i> JIEUN COMMERCE
        </a>
        <div class="d-flex align-items-center ms-auto">
            <a th:href="@{/cart}" class="btn btn-outline-primary rounded-pill me-3 position-relative">
                <i class="bi bi-cart3"></i> 장바구니
                <span th:if="${cartCount > 0}"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:text="${cartCount}">0</span>
            </a>
            <div class="btn-group">
                <a th:href="@{/login}" class="btn btn-sm btn-outline-secondary px-3">로그인</a>
                <a th:href="@{/users/join}" class="btn btn-sm btn-primary px-3">회원가입</a>
            </div>
        </div>
    </div>
</nav>
</html>
