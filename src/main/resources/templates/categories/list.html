<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>


<div class="container py-5" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">카테고리 관리</h2>
        <a th:href="@{/items}" class="btn btn-link text-decoration-none">← 상품 목록으로</a>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-3">새 카테고리 등록</h5>
            <form action="/categories/create" method="post" class="row g-3">
                <div class="col-md-9">
                    <input type="text" name="name" class="form-control" placeholder="카테고리 이름을 입력하세요 (예: 전자기기)" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-success w-100">등록</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <table class="table table-hover text-center mb-0">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}" class="fw-bold">카테고리명</td>
                <td>
                    <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-sm btn-outline-warning">수정</a>
                </td>
            </tr>
            <tr th:if="${categories.isEmpty()}">
                <td colspan="3" class="py-4 text-muted">등록된 카테고리가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
