<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">
            <i class="bi bi-shop"></i> JIEUN COMMERCE
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-4 p-md-5 bg-white">
                <h2 class="fw-bold mb-4 text-center">회원가입</h2>

                <form action="/users" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이름</label>
                        <input type="text" name="name" class="form-control" placeholder="이름을 입력하세요" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">이메일</label>
                        <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">비밀번호</label>
                        <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                    </div>

                    <hr class="my-4">

                    <h5 class="fw-bold mb-3"><i class="bi bi-geo-alt"></i> 배송 주소</h5>
                    <div class="mb-3">
                        <label class="form-label">배송지 이름 (Place)</label>
                        <input type="text" name="address.name" class="form-control" placeholder="예: 집">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">도시 (City)</label>
                        <input type="text" name="address.city" class="form-control" placeholder="예: 서울">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">거리 (Street)</label>
                        <input type="text" name="address.street" class="form-control" placeholder="예: 테헤란로">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">우편번호 (Zipcode)</label>
                        <input type="text" name="address.zipcode" class="form-control" placeholder="예: 12345">
                    </div>

                    <div class="mt-5">
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">가입하기</button>
                        <a th:href="@{/}" class="btn btn-link w-100 mt-2 text-muted text-decoration-none">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 text-center text-muted">
    <p>&copy; 2026 Jieun Commerce</p>
</footer>

</body>
</html>
