<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4 text-center">
                    <div class="mb-3">
                        <i class="bi bi-person-circle display-1 text-secondary"></i>
                    </div>
                    <h2 class="fw-bold" th:text="${user.name}">홍길동</h2>
                    <p class="text-muted" th:text="${user.email}">example@email.com</p>

                    <div class="mt-2">
                        <span th:if="${user.level?.name() == 'GOLD'}" class="badge bg-warning text-dark fs-6 px-3 py-2">GOLD Member</span>
                        <span th:if="${user.level?.name() == 'SILVER'}" class="badge bg-secondary fs-6 px-3 py-2">SILVER Member</span>
                        <span th:if="${user.level?.name() == 'BRONZE'}" class="badge bg-danger fs-6 px-3 py-2">BRONZE Member</span>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-5">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4"><i class="bi bi-truck text-success"></i> 배송지 정보</h5>
                            <div class="mb-3">
                        <span class="badge bg-light text-primary border border-primary mb-2"
                              th:text="${user.address?.name != null ? user.address?.name : '기본 배송지'}">우리집</span>
                            </div>
                            <div class="mb-2">
                                <span class="text-muted small">도시:</span>
                                <span class="ms-2 fw-semibold" th:text="${user.address?.city}">서울</span>
                            </div>
                            <div class="mb-2">
                                <span class="text-muted small">상세주소:</span>
                                <span class="ms-2 fw-semibold" th:text="${user.address?.street}">테헤란로</span>
                            </div>
                            <div>
                                <span class="text-muted small">우편번호:</span>
                                <span class="ms-2 fw-semibold" th:text="${user.address?.zipcode}">12345</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4"><i class="bi bi-graph-up-arrow text-primary"></i> 활동 통계</h5>
                            <div class="row text-center mt-3">
                                <div class="col-6 border-end">
                                    <label class="text-muted small d-block">총 주문 횟수</label>
                                    <span class="fs-3 fw-bold" th:text="|${user.orders?.size() ?: 0}건|">0건</span>
                                </div>
                                <div class="col-6">
                                    <label class="text-muted small d-block">누적 결제액</label>
                                    <span class="fs-3 fw-bold text-primary"
                                          th:text="|${#numbers.formatInteger(user.totalOrderPrice, 0, 'COMMA')}원|">0원</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mt-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-list-ul text-dark"></i> 최근 주문 내역</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light text-center">
                            <tr>
                                <th style="width: 15%">주문번호</th>
                                <th style="width: 25%">주문일시</th>
                                <th style="width: 20%">상태</th>
                                <th style="width: 25%">결제금액</th>
                                <th style="width: 15%">상세</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="order : ${user.orders}" class="text-center">
                                <td th:text="${order.orderId}">101</td>
                                <td th:text="${order.orderDate}">2026-05-24</td>
                                <td>
                    <span th:classappend="${order.orderStatus.name() == 'PAID' ? 'badge bg-success' : 'badge bg-secondary'}"
                          th:text="${order.orderStatus}" class="px-2 py-1">PAID</span>
                                </td>
                                <td class="fw-bold text-primary text-end px-5">
                                    <span th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')}">30,000</span>원
                                </td>
                                <td>
                                    <a th:href="@{/orders/{id}(id=${order.orderId})}"
                                       class="btn btn-sm btn-outline-primary rounded-pill px-3">보기</a>
                                </td>
                            </tr>
                            <tr th:if="${user.orders == null || user.orders.isEmpty()}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-cart-x d-block fs-2 mb-2"></i>
                                    주문 내역이 존재하지 않습니다.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                            </tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
            <div class="mt-5 d-flex gap-2">
                <a th:href="@{/users/{id}/edit(id=${user.userId})}" class="btn btn-dark btn-lg flex-grow-1 rounded-pill">정보 수정</a>
                <form th:action="@{/users/{id}/delete(id=${user.userId})}" method="post" class="flex-grow-1"
                      onsubmit="return confirm('정말 탈퇴시키겠습니까?');">
                    <button type="submit" class="btn btn-outline-danger btn-lg w-100 rounded-pill">회원 삭제</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 text-center text-muted mt-5">
    <p>&copy; 2026 Jieun Commerce</p>
</footer>

</body>
</html>
