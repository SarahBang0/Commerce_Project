<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>


<div class="container">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">회원 관리 목록</h2>
                <span class="badge bg-info text-dark" th:text="|총 ${users != null ? users.size() : 0}명|">총 0명</span>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light text-center">
                    <tr>
                        <th style="width: 8%">No</th> <th style="width: 15%">이름</th>
                        <th style="width: 25%">이메일</th>
                        <th style="width: 15%">등급</th>
                        <th style="width: 22%">누적 주문액</th>
                        <th style="width: 15%">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user, status : ${users}" class="text-center">
                        <td th:text="${status.count}">1</td>

                        <td>
                            <strong th:text="${user.name}">지은이</strong>
                        </td>

                        <td class="text-start" th:text="${user.email}">jieun@example.com</td>

                        <td>
                            <span th:if="${user.level?.name() == 'GOLD'}" class="badge bg-warning text-dark">GOLD</span>
                            <span th:if="${user.level?.name() == 'SILVER'}" class="badge bg-secondary">SILVER</span>
                            <span th:if="${user.level?.name() == 'BRONZE'}" class="badge bg-danger">BRONZE</span>
                        </td>

                        <td class="fw-bold text-primary text-end">
                            <span th:text="${#numbers.formatInteger(user.totalOrderPrice, 0, 'COMMA')}">0</span>원
                        </td>

                        <td>
                            <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-dark rounded-pill px-3">조회</a>
                        </td>
                    </tr>

                    <tr th:if="${users == null || users.isEmpty()}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            가입된 회원이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 text-center text-muted">
    <p>&copy; 2026 Jieun Commerce</p>
</footer>

</body>
</html>
