<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>


<div class="container" style="max-width: 600px;">
    <div class="py-5 text-center">
        <h2 class="fw-bold">상품 주문</h2>
    </div>

    <div class="card border-0 shadow-sm p-4">
        <form th:action="@{/orders/create}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">주문 상품</label>
                <select name="itemId" class="form-select" required>
                    <option value="">-- 상품을 선택하세요 --</option>
                    <option th:each="item : ${items}"
                            th:value="${item.itemId}"
                            th:text="|${item.name} (재고: ${item.quantity}개 / 가격: ${item.price}원)|">상품명</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">주문 수량</label>
                <input type="number" name="quantity" class="form-control" min="1" placeholder="수량을 입력하세요" required>
            </div>

            <hr class="my-4">

            <div class="d-grid gap-2">
                <button class="btn btn-primary btn-lg rounded-pill" type="submit">주문하기</button>
                <button class="btn btn-outline-secondary btn-lg rounded-pill"
                        th:onclick="|location.href='@{/items}'|" type="button">취소</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
