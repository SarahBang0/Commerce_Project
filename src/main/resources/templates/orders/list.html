<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark mb-0">📜 주문 관리 목록</h2>
                <span class="badge bg-info text-dark rounded-pill px-3"
                      th:text="|총 ${orders != null ? orders.size() : 0}건|">총 0건</span>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 text-center">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 10%">주문번호</th>
                        <th style="width: 20%">주문자(이메일)</th>
                        <th>주문 상품</th>
                        <th style="width: 15%">총 결제액</th>
                        <th style="width: 10%">수량</th>
                        <th style="width: 12%">상태</th>
                        <th style="width: 15%">일시</th>
                        <th style="width: 10%">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderId}" class="text-muted small">1</td>
                        <td class="text-start ps-3">
                            <span class="fw-medium" th:text="${order.userEmail}">jieun@example.com</span>
                        </td>
                        <td class="text-start ps-4">
                            <span class="fw-bold text-dark" th:text="${order.itemName}">나이키 운동화 외</span>
                        </td>
                        <td class="text-primary fw-bold"
                            th:text="|${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')}원|">10,000원</td>
                        <td>
                            <span class="badge bg-secondary rounded-pill" th:text="|${order.totalCount}개|">1개</span>
                        </td>
                        <td>
                            <span class="badge px-3 py-2 rounded-pill"
                                  th:classappend="${order.orderStatus.name() == 'ORDER'} ? 'bg-primary' : 'bg-danger'"
                                  th:text="${order.orderStatus}">ORDER</span>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-05-24 22:00</td>
                        <td>
                            <a th:href="@{/orders/{id}(id=${order.orderId})}"
                               class="btn btn-sm btn-outline-dark rounded-pill px-3 shadow-sm">상세</a>
                        </td>
                    </tr>

                    <tr th:if="${orders == null || orders.isEmpty()}">
                        <td colspan="8" class="py-5 text-muted">주문 내역이 존재하지 않습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<nav th:replace="~{fragments/footer :: footer}"></nav>

</body>
</html>
