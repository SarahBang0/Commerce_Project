<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}" />
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="bg-white py-5">
    <div class="container py-5 text-center">
<!--        <h1 class="display-4 fw-bold mb-3">데이터로 증명하는 쇼핑</h1>
        <p class="lead text-muted mb-5">회원 등급 시스템과 실시간 재고 연동을 직접 경험해보세요.</p>-->
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a th:href="@{/items}" class="btn btn-dark btn-lg px-5 gap-3 rounded-pill shadow">지금 쇼핑하기</a>
        </div>
    </div>
</div>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm p-4 text-center">
                <div class="mb-3">
                    <i class="bi bi-people-fill display-4 text-primary"></i>
                </div>
                <h4 class="fw-bold">회원 현황</h4>
                <p class="text-muted small">등록된 전체 회원 목록을 확인하고 등급을 관리합니다.</p>
                <a th:href="@{/users}" class="btn btn-outline-primary mt-auto rounded-pill">회원 목록 바로가기</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm p-4 text-center">
                <div class="mb-3">
                    <i class="bi bi-box-seam-fill display-4 text-success"></i>
                </div>
                <h4 class="fw-bold">상품 관리</h4>
                <p class="text-muted small">판매 중인 상품 리스트와 재고 상태를 확인합니다.</p>
                <a th:href="@{/items}" class="btn btn-outline-success mt-auto rounded-pill">상품 목록 바로가기</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm p-4 text-center">
                <div class="mb-3">
                    <i class="bi bi-receipt display-4 text-warning"></i>
                </div>
                <h4 class="fw-bold">주문 내역</h4>
                <p class="text-muted small">전체 주문 히스토리와 배송 상태를 모니터링합니다.</p>
                <a th:href="@{/orders}" class="btn btn-outline-warning mt-auto rounded-pill">주문 목록 바로가기</a>
            </div>
        </div>
    </div>
</div>

<nav th:replace="~{fragments/footer :: footer}"></nav>


</body>
</html>
