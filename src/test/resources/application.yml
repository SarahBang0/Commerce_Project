spring:
  datasource:
    # 파일 모드로 설정 (데이터 유지)
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # 시작할 때 테이블을 자동으로 생성 (연습할 때 매우 편함)
      ddl-auto: create
    properties:
      hibernate:
        # SQL을 콘솔창에 예쁘게 출력
        show_sql: true
        format_sql: true
        # 쿼리가 왜 나갔는지 파라미터 확인
        use_sql_comments: true

  h2:
    console:
      # 웹에서 DB를 확인할 수 있는 콘솔 활성화
      enabled: true

logging:
  level:
    org.hibernate.SQL: debug
    # 쿼리 파라미터(?)에 어떤 값이 들어갔는지 로그로 보여줌
    org.hibernate.orm.jdbc.bind: trace